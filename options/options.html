<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRX User Script</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="page-title-row">
        <h1 data-i18n="options_page_title">유저 스크립트 관리</h1>
        <button
          type="button"
          id="btn-refresh"
          class="btn btn-icon"
          data-i18n-title="options_refresh"
          title="새로고침"
          aria-label="새로고침"
        >
          <svg class="btn-icon__svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 0 1-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
            />
          </svg>
        </button>
      </div>
      <p class="subtitle" data-i18n="options_page_subtitle">
        URL 패턴에 맞는 페이지에 스크립트를 주입합니다. 저장 후 해당 탭을 새로고침하세요.
      </p>
      <aside class="notice" role="note">
        <strong data-i18n="options_notice_devtools_title">DevTools 안내</strong>
        <p data-i18n="options_notice_devtools_body"></p>
      </aside>
      <p id="api-warning" class="api-warning" hidden></p>
    </header>

    <div class="sticky-chrome-sentinel" aria-hidden="true"></div>
    <div id="sticky-chrome" class="sticky-chrome">
      <div class="sticky-chrome__inner">
        <nav class="options-tabs" aria-label="Options sections">
          <button
            type="button"
            id="tab-scripts"
            class="options-tab is-active"
            data-panel="scripts"
            data-i18n="options_tab_scripts"
            aria-controls="panel-scripts"
            aria-selected="true"
          >
            페이지별 스크립트
          </button>
          <button
            type="button"
            id="tab-common-utils"
            class="options-tab"
            data-panel="common-utils"
            data-i18n="options_tab_common_utils"
            aria-controls="panel-common-utils"
            aria-selected="false"
          >
            공통 유틸
          </button>
        </nav>
        <p id="editor-breadcrumb" class="editor-breadcrumb" hidden aria-live="polite"></p>
        <div class="toolbar">
          <button
            type="button"
            id="btn-nav-tree"
            class="btn btn-nav-tree"
            aria-controls="nav-tree-drawer"
            aria-expanded="false"
            data-i18n-title="options_nav_tree_toggle"
            title="탐색"
          >
            ☰
          </button>
          <button type="button" id="btn-add" class="btn btn-primary" data-i18n="options_add_row">스크립트 추가</button>
          <button type="button" id="btn-export" class="btn" data-i18n="options_export">내보내기</button>
          <button type="button" id="btn-import" class="btn" data-i18n="options_import">가져오기</button>
          <input type="file" id="import-file" accept="application/json,.json" hidden>
          <span id="save-status" class="save-status" aria-live="polite"></span>
        </div>
      </div>
    </div>

    <div id="nav-tree-backdrop" class="nav-tree-backdrop" hidden></div>
    <aside
      id="nav-tree-drawer"
      class="nav-tree-drawer"
      hidden
      aria-label="Script navigator"
    >
      <div class="nav-tree-drawer__header">
        <strong data-i18n="options_nav_tree_title">탐색</strong>
        <button
          type="button"
          id="btn-nav-tree-close"
          class="btn btn-compact"
          data-i18n="options_nav_tree_close"
        >
          닫기
        </button>
      </div>
      <div id="nav-tree" class="nav-tree"></div>
    </aside>

    <div class="script-list-wrap">
      <div id="page-loading" class="page-loading">
        <span class="spinner" aria-hidden="true"></span>
        <span data-i18n="options_loading">불러오는 중…</span>
      </div>
      <main id="panel-scripts" class="options-panel">
        <div id="script-list" hidden></div>
      </main>
      <section id="panel-common-utils" class="options-panel common-utils-panel" hidden>
        <div class="common-utils-intro">
          <div class="common-utils-intro__text">
            <h2 data-i18n="options_common_utils_title">공통 유틸</h2>
            <p data-i18n="options_common_utils_description">
              활성 유틸 모듈이 합쳐져 모든 페이지별 스크립트보다 먼저 실행됩니다.
              각 모듈은 export const utils = { ... } 형태로 작성하세요.
            </p>
          </div>
          <label class="common-utils-intro__enable">
            <input type="checkbox" id="common-utils-enabled" checked>
            <span data-i18n="options_enabled">활성</span>
          </label>
        </div>
        <p id="common-utils-conflict" class="common-utils-conflict" hidden></p>
        <div id="common-utils-list" class="common-utils-list"></div>
        <p id="common-utils-empty" class="empty-state" hidden data-i18n="options_common_utils_empty">
          유틸이 없습니다. 「유틸 추가」를 눌러 시작하세요.
        </p>
      </section>
    </div>
  </div>
  <script src="../lib/match.js"></script>
  <script src="../lib/script-status.js"></script>
  <script src="../lib/editor-config.js"></script>
  <script src="../lib/common-utils.js"></script>
  <script src="../lib/page-script.js"></script>
  <script src="../vendor/codemirror/codemirror.bundle.js"></script>
  <script src="../lib/light-code-editor.js"></script>
  <script src="options.js"></script>
</body>
</html>
